
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מערכת ניהול משימות</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Assistant', 'Inter', sans-serif;
      overflow: hidden;
      background-color: #0d1117;
      color: #e6edf3;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 10px;
    }
    .gauge-container {
      position: relative;
      width: 140px;
      height: 70px;
      overflow: hidden;
    }
    .gauge-bg {
      fill: none;
      stroke: #21262d;
      stroke-width: 12;
    }
    .gauge-fill {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dasharray 0.5s ease;
    }
  </style>
